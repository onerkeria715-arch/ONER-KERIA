<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONER / KERIA 應援領取查詢</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background: url('1.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: rgba(30, 30, 30, 0.85);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 320px;
            width: 85%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        @media (max-width: 480px) {
            .container {
                transform: scale(0.9); 
            }
        }

        h2 { 
            color: #ff4d4d;
            margin-bottom: 10px; 
            font-size: 1.2rem;
            line-height: 1.4;
        }

        p { color: #cccccc; margin-bottom: 20px; font-size: 0.85rem; }

        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #444;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff4d4d 0%, #b30000 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            width: 60%;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
            min-height: 60px;
        }

        .number-display {
            font-size: 2.2rem;
            display: block;
            margin-top: 5px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .error-msg { color: #ff8888; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>ONER/KERIA證件套鑰匙圈<br>應援主場日領取編號</h2>
    <p>請輸入您的 Threads ID 查詢</p>
    
    <input type="text" id="userInput" placeholder="例如: vickyt1ok">
    <br>
    <button onclick="checkID()">立即查詢</button>
    <div id="result"></div>
</div>

<script>
    const dataList = {
        // 範例
        "vickyt1ok": "O01",
        
        // K系列名單
        "ciao__charlotte": "K01",
        "huii_yunn": "K02",
        "niozerodis": "K03",
        "suuuuuryu": "K04",
        "sauce_pan260": "K05",
        "Evelyn.0225": "K06",
        "yui_xx.x": "K07",
        "plumakerrr": "K08",
        "rrrrita.506": "K09",
        "joy0203_denny1009": "K10",
        "rabbit.hh_": "K11",
        "n.mi__": "K12",
        "soayoooo": "K13",
        "morimoriimo": "K14",
        "ivy_.10.05": "K15",
        "_erehydobon": "K16",

        // O系列名單 (已修正為 O + 數字)
        "ru8_96": "O02",
        "cc7_7__t1": "O03",
        "kchuang13": "O04",
        "yw.life": "O05",
        "k_yfo_": "O06",
        "b_oom1111": "O07",
        "miya1328": "O08",
        "tientsui": "O09",
        "ritahcy__0912": "O10",
        "Dreykam": "O11",
        "suga.niya": "O12",
        "25t1_ting": "O13",
        "nana0330__": "O14",
        "zorwa1116": "O15",
        "Ttoooooooloomo": "O16",
        "plaeneter_0.55_und_0.50": "O17",
        "strayed_killerwhale": "O18",
        "alrinn99": "O19"
    };

    function checkID() {
        const input = document.getElementById('userInput').value.trim();
        const resultDiv = document.getElementById('result');
        
        if (input === "") {
            resultDiv.innerHTML = "<span class='error-msg'>請先輸入 ID 唷！</span>";
            return;
        }

        const foundKey = Object.keys(dataList).find(key => key.toLowerCase() === input.toLowerCase());

        if (foundKey) {
            resultDiv.innerHTML = `您的領取編號是：<br><span class="number-display">${dataList[foundKey]}</span>`;
        } else {
            resultDiv.innerHTML = "<span class='error-msg'>查無此 ID<br>請檢查拼字或底線數量！</span>";
        }
    }
</script>

</body>
</html>
